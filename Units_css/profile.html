<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #dbeafe, #f8fafc);
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .content {
        width: 350px;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        padding-bottom: 20px;
      }

      .top-bg {
        width: 100%;
        height: 120px;
        background: rgb(44, 116, 164);
      }

      .profile {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 5px solid white;
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        object-fit: cover;
      }

      .child {
        margin-top: 85px;
        color: rgb(55, 55, 94);
      }

      .child h3 {
        font-size: 28px;
      }

      .child p {
        margin-top: 5px;
        margin-bottom: 20px;
      }

      .icons {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-bottom: 25px;
      }

      .icons i {
        font-size: 26px;
        transition: 0.8s;
        cursor: pointer;
      }

      .icons i:hover {
        transform: scale(1.3);
      }

      .fa-facebook {
        color: #1877f2;
      }

      .fa-whatsapp {
        color: #25d366;
      }

      .fa-instagram {
        color: #e4405f;
      }

      .fa-youtube {
        color: #ff0000;
      }

      .button-css {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      button {
        background: rgb(70, 70, 172);
        color: white;
        border: none;
        border-radius: 25px;
        padding: 10px 30px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }
      .stats {
        display: flex;
        justify-content: center;
        margin-top: 25px;
      }

      .stats div {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 18px;
        border-right: 1px solid #bbb;
      }

      .stats div:last-child {
        border-right: none;
      }
    </style>
  </head>

  <body>
    <div class="content">
      <div class="top-bg"></div>

      <img
        src="https://tse4.mm.bing.net/th/id/OIP.k7Q1aP2J6cGwT_fxr_exKwAAAA?r=0&pid=Api&P=0&h=180"
        class="profile"
      />

      <div class="child">
        <h3>CodingLab</h3>
        <p>YouTuber & Blogger</p>

        <div class="icons">
          <i class="fa-brands fa-facebook"></i>
          <i class="fa-brands fa-whatsapp"></i>
          <i class="fa-brands fa-instagram"></i>
          <i class="fa-brands fa-youtube"></i>
        </div>
      </div>

      <div class="button-css">
        <button>Subscribe</button>
        <button>Message</button>
      </div>
      <div class="stats">
        <div>
          <i class="fa-regular fa-heart"></i>
          <p>60.4k</p>
        </div>

        <div>
          <i class="fa-regular fa-comment"></i>
          <p>20k</p>
        </div>

        <div>
          <i class="fa-solid fa-share"></i>
          <p>12.4k</p>
        </div>
      </div>
    </div>
  </body>
</html>
