<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        
      }
      table {
        border-collapse: collapse;
      }
      td,
      th,
      tr {
        border: 1px solid rgb(15, 16, 15);
        padding: 7px;
        border-collapse: collapse;
      }
      tr {
        padding: 7px;
      }
      th {
        background-color: darkgray;
        color:black;
        padding: 14px;
        transition: 0.2s;
      }

      th:hover {
        background-color: #4b6db5;
        cursor: pointer;
        transform: scale(1.02);
      }

      caption {
        caption-side: top;
        font-size: 20px;
        font-weight: bold;
        color: #1f2937;
        margin-bottom: 20px;
      }
      tbody tr:hover {
        background-color: gray;
        transform: scale(1.01);
        transition: 0.2s;
        cursor: pointer;
      }

      td[rowspan] {
        font-weight: bold;
        color: #1e40af;
      }
      tfoot:hover{
        cursor: pointer;
        background-color: gray;
        transition: 0.2s;
        transform: scale(1.01);
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        This table has salary records
      </caption>
      <colgroup>
        <col style="background-color: lightgray" />
        <col style="background-color: lightgray" />
        <col style="background-color: lightgray" />
        <col style="background-color: lightgray" />
      </colgroup>
      <thead>
        <tr>
          <th>Emp code</th>
          <th>Emp Name</th>
          <th>Job title</th>
          <th>Salary (LPA)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>911</td>
          <td>Sheikh Zoya</td>
          <td>Developer</td>
          <td>3.6</td>
        </tr>
      </tbody>
      <tbody>
        <tr>
          <td>912</td>
          <td>Lisa Dev</td>
          <td>Tester</td>
          <td rowspan="2">5.2</td>
        </tr>
        <tr>
          <td>913</td>
          <td>Deepak Jadeja</td>
          <td>Developer</td>
        </tr>
      </tbody>
      <tbody>
        <tr>
          <td>914</td>
          <td>Aiti Yewale</td>
          <td>Digital Marketing</td>
          <td>4</td>
        </tr>
      </tbody>
      <tbody>
        <tr>
          <td>915</td>
          <td>Simran Rao</td>
          <td>HR</td>
          <td>5.6</td>
        </tr>
      </tbody>
      <tfoot>
        <tr style="text-align: center">
          <td colspan="4">this is table footer</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
